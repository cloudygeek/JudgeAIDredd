<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Judge Dredd — Dashboard</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --amber: #d29922;
      --blue: #58a6ff;
      --purple: #bc8cff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 24px; font-weight: 600; }
    header h1 span { color: var(--red); }
    .version { color: var(--muted); font-size: 14px; }
    .mode-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .mode-interactive { background: var(--amber); color: #000; }
    .mode-autonomous { background: var(--red); color: #fff; }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .stat-value {
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
    }
    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-value.green { color: var(--green); }
    .stat-value.red { color: var(--red); }
    .stat-value.amber { color: var(--amber); }
    .stat-value.blue { color: var(--blue); }

    /* Sessions list */
    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title .count {
      background: var(--border);
      color: var(--muted);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 14px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-allow { background: rgba(63,185,80,0.15); color: var(--green); }
    .badge-deny { background: rgba(248,81,73,0.15); color: var(--red); }
    .badge-review { background: rgba(210,153,34,0.15); color: var(--amber); }
    .badge-on-task { background: rgba(63,185,80,0.15); color: var(--green); }
    .badge-scope-creep { background: rgba(210,153,34,0.15); color: var(--amber); }
    .badge-drifting { background: rgba(248,81,73,0.15); color: var(--red); }
    .badge-hijacked { background: rgba(248,81,73,0.3); color: var(--red); }

    .task-text {
      max-width: 400px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }
    .muted { color: var(--muted); }

    /* Live feed */
    #live-feed {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      max-height: 400px;
      overflow-y: auto;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .feed-entry { padding: 4px 0; border-bottom: 1px solid var(--border); }
    .feed-entry:last-child { border-bottom: none; }
    .feed-time { color: var(--muted); }
    .feed-allow { color: var(--green); }
    .feed-deny { color: var(--red); }
    .feed-tool { color: var(--blue); }
    .feed-intent { color: var(--purple); }

    /* Drift chart */
    .drift-bar {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .drift-track {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      position: relative;
    }
    .drift-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s;
    }
    .drift-value { font-size: 11px; color: var(--muted); min-width: 40px; text-align: right; }

    .refresh-btn {
      background: var(--border);
      color: var(--text);
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .refresh-btn:hover { background: #484f58; }

    .empty { color: var(--muted); text-align: center; padding: 40px; }

    /* Session detail modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      overflow-y: auto;
      padding: 40px 20px;
    }
    .modal-overlay.active { display: block; }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }
    .modal h2 { margin-bottom: 16px; }
    .modal-close {
      float: right;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 24px;
      cursor: pointer;
    }
    .modal-close:hover { color: var(--text); }
    pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      overflow-x: auto;
      font-size: 12px;
      max-height: 500px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Judge <span>Dredd</span></h1>
      <span class="version" id="version">loading...</span>
    </div>
    <div style="display:flex;gap:12px;align-items:center">
      <span class="mode-badge" id="mode-badge">...</span>
      <button class="refresh-btn" onclick="refresh()">Refresh</button>
    </div>
  </header>

  <div class="stats" id="stats">
    <div class="stat"><div class="stat-value blue" id="s-sessions">-</div><div class="stat-label">Sessions</div></div>
    <div class="stat"><div class="stat-value" id="s-tools">-</div><div class="stat-label">Tool Calls</div></div>
    <div class="stat"><div class="stat-value green" id="s-allowed">-</div><div class="stat-label">Allowed</div></div>
    <div class="stat"><div class="stat-value red" id="s-denied">-</div><div class="stat-label">Denied</div></div>
    <div class="stat"><div class="stat-value amber" id="s-judged">-</div><div class="stat-label">Judge Calls</div></div>
    <div class="stat"><div class="stat-value" id="s-active">-</div><div class="stat-label">Active Now</div></div>
  </div>

  <div class="section-title">Live Feed <span class="count" id="feed-count">0</span></div>
  <div id="live-feed"><div class="empty">Waiting for hook events...</div></div>

  <div class="section-title">Sessions <span class="count" id="session-count">0</span></div>
  <table id="sessions-table">
    <thead>
      <tr>
        <th>Time</th>
        <th>Task</th>
        <th>Turns</th>
        <th>Tools</th>
        <th>Denied</th>
        <th>Files</th>
        <th>Classification</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="sessions-body">
      <tr><td colspan="8" class="empty">No sessions yet</td></tr>
    </tbody>
  </table>

  <div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <h2 id="modal-title">Session Detail</h2>
      <pre id="modal-content"></pre>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let feedEntries = [];

    async function refresh() {
      try {
        // Health / stats
        const health = await (await fetch(`${API}/health`)).json();
        document.getElementById('version').textContent = `v${health.version}`;
        document.getElementById('mode-badge').textContent = health.config.mode;
        document.getElementById('mode-badge').className =
          `mode-badge mode-${health.config.mode}`;
        document.getElementById('s-active').textContent = health.activeSessions;

        // Sessions
        const sessions = await (await fetch(`${API}/api/sessions`)).json();
        document.getElementById('session-count').textContent = sessions.length;
        document.getElementById('s-sessions').textContent = sessions.length;

        let totalTools = 0, totalDenied = 0, totalJudged = 0, totalAllowed = 0;

        const tbody = document.getElementById('sessions-body');
        if (sessions.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" class="empty">No sessions yet</td></tr>';
        } else {
          tbody.innerHTML = sessions.map(s => {
            const tools = s.summary?.toolCalls ?? 0;
            const denied = s.summary?.denied ?? 0;
            const files = s.summary?.filesWritten ?? 0;
            const allowed = tools - denied;
            totalTools += tools;
            totalDenied += denied;
            totalAllowed += allowed;

            const lastMetric = (s.turnMetrics ?? s.summary?.turnMetrics ?? []).slice(-1)[0];
            const classification = lastMetric?.classification ?? 'on-task';

            const time = new Date(s.timestamp).toLocaleTimeString();
            const task = (s.originalTask ?? '').substring(0, 80);

            return `<tr>
              <td class="mono muted">${time}</td>
              <td class="task-text" title="${(s.originalTask??'').replace(/"/g,'&quot;')}">${task}</td>
              <td>${s.summary?.turns ?? 0}</td>
              <td>${tools}</td>
              <td>${denied > 0 ? `<span class="badge badge-deny">${denied}</span>` : '0'}</td>
              <td>${files}</td>
              <td><span class="badge badge-${classification}">${classification}</span></td>
              <td><button class="refresh-btn" onclick="showSession('${s.sessionId}')">Detail</button></td>
            </tr>`;
          }).join('');
        }

        document.getElementById('s-tools').textContent = totalTools;
        document.getElementById('s-allowed').textContent = totalAllowed;
        document.getElementById('s-denied').textContent = totalDenied;

        // Feed
        const feed = await (await fetch(`${API}/api/feed`)).json();
        document.getElementById('feed-count').textContent = feed.length;
        document.getElementById('s-judged').textContent =
          feed.filter(f => f.stage?.includes('judge')).length;

        if (feed.length > 0) {
          document.getElementById('live-feed').innerHTML = feed.map(f => {
            const time = new Date(f.timestamp).toLocaleTimeString();
            const cls = f.allowed === false ? 'feed-deny' :
                        f.type === 'intent' ? 'feed-intent' : 'feed-allow';
            const icon = f.allowed === false ? '✗' :
                         f.type === 'intent' ? '◆' : '✓';
            return `<div class="feed-entry">
              <span class="feed-time">${time}</span>
              <span class="${cls}">${icon}</span>
              <span class="feed-tool">${f.tool ?? f.type ?? ''}</span>
              ${f.stage ? `<span class="muted">[${f.stage}]</span>` : ''}
              <span class="muted">${(f.reason ?? f.prompt ?? '').substring(0, 80)}</span>
            </div>`;
          }).reverse().join('');
        }

      } catch (err) {
        console.error('Refresh failed:', err);
      }
    }

    async function showSession(id) {
      try {
        const data = await (await fetch(`${API}/api/session-log/${id}`)).json();
        document.getElementById('modal-title').textContent =
          `Session ${id.substring(0, 8)} — ${(data.originalTask ?? '').substring(0, 60)}`;
        document.getElementById('modal-content').textContent =
          JSON.stringify(data, null, 2);
        document.getElementById('modal').classList.add('active');
      } catch (err) {
        alert('Failed to load session: ' + err.message);
      }
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    // Auto-refresh every 5 seconds
    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
